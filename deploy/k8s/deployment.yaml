apiVersion: apps/v1
kind: Deployment
metadata:
  name: docket
  namespace: docket
  labels:
    app: docket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: docket
  template:
    metadata:
      labels:
        app: docket
      annotations:
        # Restart pods when the secret changes (checksum-based rollout trigger).
        # Remove if you manage rollouts manually.
        kubectl.kubernetes.io/restartPolicy: Always
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532   # distroless nonroot
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: docket
          # Pin to a specific version in production — avoid using :latest.
          image: ghcr.io/allmend/docket:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9412
              protocol: TCP
          env:
            - name: MODE
              value: "all"
            - name: HTTP_PORT
              value: "8081"
            - name: METRICS_PORT
              value: "9412"
          envFrom:
            - secretRef:
                name: docket
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      # Pull from GHCR — public images don't need imagePullSecrets.
      # If you fork to a private registry, add an imagePullSecret here.
