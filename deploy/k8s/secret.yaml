# Copy this file, fill in the values, and apply with:
#   kubectl apply -f secret.yaml
#
# stringData values are plain text — kubectl base64-encodes them for you.
# Do not commit the filled-in version to git.
apiVersion: v1
kind: Secret
metadata:
  name: docket
  namespace: docket
type: Opaque
stringData:
  DATABASE_URL: "postgres://docket:changeme@postgres.docket.svc.cluster.local:5432/docket?sslmode=disable"
  JWT_SECRET: "replace-with-a-long-random-string"
  # Seed credentials — only used on first startup to create the initial org + admin user.
  # Safe to leave set after first run; autoSeed is idempotent.
  SEED_ORG_NAME: "My Team"
  SEED_ORG_SLUG: "myteam"
  SEED_USERNAME: "admin"
  SEED_NAME: "Admin"
  SEED_EMAIL: "admin@example.com"
  SEED_PASSWORD: "changeme"
