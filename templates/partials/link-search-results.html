{{define "link-search-results"}}
{{if .Tickets}}
<ul class="max-h-[240px] overflow-y-auto bg-base-200 border border-base-300 rounded-md shadow-pop p-1 space-y-1">
  {{range .Tickets}}
  <li>
    <button type="button"
            @click="htmx.ajax('POST','/tickets/{{$.TicketID}}/links',{values:{to_ticket_id:'{{.ID}}',relation_type:rel},target:'#ticket-links',swap:'outerHTML'}); closeAdd()"
            class="w-full text-left flex items-center gap-2.5 px-2.5 py-1.5 rounded hover:bg-base-300 cursor-pointer">
      <span class="mono text-[13px] text-primary-400 shrink-0">{{.DisplayID}}</span>
      <span class="text-[14px] text-base-800 truncate flex-1 min-w-0">{{.Title}}</span>
    </button>
  </li>
  {{end}}
</ul>
{{else}}
<div class="bg-base-200 border border-base-300 rounded-md shadow-pop px-3 py-2 mono text-[13px] text-base-600">No tickets match that search.</div>
{{end}}
{{end}}
