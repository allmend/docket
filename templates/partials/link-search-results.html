{{define "link-search-results"}}
{{range .Tickets}}
<div x-data="{rel:'relates_to'}" class="flex items-center gap-2 py-1">
  <select x-model="rel"
          class="bg-base-300 border border-base-350 rounded px-1 py-0.5 text-[12px] text-base-900 focus:outline-none shrink-0">
    <option value="relates_to">relates to</option>
    <option value="blocks">blocks</option>
    <option value="depends_on">depends on</option>
    <option value="duplicates">duplicates</option>
  </select>
  <span class="mono text-[12px] text-primary-400 shrink-0">{{.DisplayID}}</span>
  <span class="text-[13px] text-base-800 flex-1 truncate">{{.Title}}</span>
  <form :action="'/tickets/{{$.TicketID}}/links'" method="POST" @submit.prevent="
        const fd = new FormData($el);
        fd.set('relation_type', rel);
        htmx.ajax('POST', $el.action, {values: Object.fromEntries(fd), swap:'none'});
        $el.closest('[x-data]').remove()">
    <input type="hidden" name="to_ticket_id" value="{{.ID}}">
    <button type="submit"
            class="shrink-0 h-5 w-5 inline-flex items-center justify-center bg-primary-500 hover:bg-primary-400 text-[#062b1d] rounded text-[13px] font-semibold">+</button>
  </form>
</div>
{{else}}
<div class="py-2 text-[13px] text-base-600 text-center">No tickets found</div>
{{end}}
{{end}}
