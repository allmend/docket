{{define "rich-editor"}}
{{/* Parameters (via dict): .Name .Value .Placeholder .Rows */}}
<div x-data="richEditor('{{.Name}}')" class="flex flex-col">

  <!-- Toolbar — Codex layout: headings · inline · blocks · view toggle.
       Works in both modes: visual edits the DOM, code inserts markdown syntax. -->
  <div class="flex items-center border border-base-300 rounded-t-lg bg-base-200 px-2 py-1 min-h-[2.25rem] gap-0.5 flex-wrap">

    <!-- Headings -->
    <button type="button" @mousedown.prevent @click="setBlock('h1')"
            :class="blockType === 'h1' ? 'bg-base-300 text-primary-400' : 'text-base-600 hover:text-base-950 hover:bg-base-250'"
            class="h-7 px-1.5 flex items-center justify-center rounded font-mono text-[11px] font-semibold transition-colors" title="Heading 1">H1</button>
    <button type="button" @mousedown.prevent @click="setBlock('h2')"
            :class="blockType === 'h2' ? 'bg-base-300 text-primary-400' : 'text-base-600 hover:text-base-950 hover:bg-base-250'"
            class="h-7 px-1.5 flex items-center justify-center rounded font-mono text-[11px] font-semibold transition-colors" title="Heading 2">H2</button>
    <button type="button" @mousedown.prevent @click="setBlock('h3')"
            :class="blockType === 'h3' ? 'bg-base-300 text-primary-400' : 'text-base-600 hover:text-base-950 hover:bg-base-250'"
            class="h-7 px-1.5 flex items-center justify-center rounded font-mono text-[11px] font-semibold transition-colors" title="Heading 3">H3</button>

    <div class="w-px h-4 bg-base-300 mx-1 shrink-0"></div>

    <!-- Inline formatting -->
    <button type="button" @mousedown.prevent @click="toggleInline('strong')"
            :class="isBold ? 'bg-base-300 text-primary-400' : 'text-base-600 hover:text-base-950 hover:bg-base-250'"
            class="w-7 h-7 flex items-center justify-center rounded text-sm font-bold transition-colors" title="Bold">B</button>
    <button type="button" @mousedown.prevent @click="toggleInline('em')"
            :class="isItalic ? 'bg-base-300 text-primary-400' : 'text-base-600 hover:text-base-950 hover:bg-base-250'"
            class="w-7 h-7 flex items-center justify-center rounded text-sm italic transition-colors" title="Italic">I</button>
    <button type="button" @mousedown.prevent @click="toggleInline('s')"
            :class="isStrike ? 'bg-base-300 text-primary-400' : 'text-base-600 hover:text-base-950 hover:bg-base-250'"
            class="w-7 h-7 flex items-center justify-center rounded text-sm transition-colors" title="Strikethrough">
      <span class="line-through">S</span>
    </button>
    <button type="button" @mousedown.prevent @click="toggleInline('code')"
            :class="isCode ? 'bg-base-300 text-primary-400' : 'text-base-600 hover:text-base-950 hover:bg-base-250'"
            class="w-7 h-7 flex items-center justify-center rounded text-xs font-mono transition-colors" title="Inline code">&lt;&gt;</button>

    <div class="w-px h-4 bg-base-300 mx-1 shrink-0"></div>

    <!-- Bullet list -->
    <button type="button" @mousedown.prevent @click="toggleList('ul')"
            class="w-7 h-7 flex items-center justify-center rounded text-base-600 hover:text-base-950 hover:bg-base-250 transition-colors" title="Bullet list">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M8 6h12M8 12h12M8 18h12"/>
        <circle cx="3.5" cy="6" r="1.4" fill="currentColor" stroke="none"/>
        <circle cx="3.5" cy="12" r="1.4" fill="currentColor" stroke="none"/>
        <circle cx="3.5" cy="18" r="1.4" fill="currentColor" stroke="none"/>
      </svg>
    </button>

    <!-- Numbered list -->
    <button type="button" @mousedown.prevent @click="toggleList('ol')"
            class="w-7 h-7 flex items-center justify-center rounded text-base-600 hover:text-base-950 hover:bg-base-250 transition-colors" title="Numbered list">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M10 6h10M10 12h10M10 18h10"/>
        <path d="M3 5.5 4.4 5v3.2M3 16.5h2.2L3 19h2.4" stroke-width="1.6"/>
      </svg>
    </button>

    <!-- Quote -->
    <button type="button" @mousedown.prevent @click="setBlock('blockquote')"
            :class="blockType === 'blockquote' ? 'bg-base-300 text-primary-400' : 'text-base-600 hover:text-base-950 hover:bg-base-250'"
            class="w-7 h-7 flex items-center justify-center rounded transition-colors" title="Quote">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M7 7H4v6h5V9M18 7h-3v6h5V9"/>
      </svg>
    </button>

    <!-- Code block -->
    <button type="button" @mousedown.prevent @click="setCodeBlock()"
            :class="blockType === 'pre' ? 'bg-base-300 text-primary-400' : 'text-base-600 hover:text-base-950 hover:bg-base-250'"
            class="w-7 h-7 flex items-center justify-center rounded transition-colors" title="Code block">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="m9 8-4 4 4 4M15 8l4 4-4 4"/>
      </svg>
    </button>

    <!-- Link -->
    <button type="button" @mousedown.prevent @click="insertLink()"
            class="w-7 h-7 flex items-center justify-center rounded text-base-600 hover:text-base-950 hover:bg-base-250 transition-colors" title="Link">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/>
        <path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/>
      </svg>
    </button>

    <div class="flex-1"></div>

    <!-- Segmented Visual / Code view toggle -->
    <div class="flex items-center gap-0.5 p-0.5 bg-base-150 border border-base-300 rounded-lg" role="group" aria-label="Display format">
      <button type="button" @click="switchToVisual()"
              :class="mode === 'visual' ? 'bg-base-300 text-base-950 shadow-sm' : 'text-base-600 hover:text-base-900'"
              class="flex items-center gap-1 h-6 px-2 rounded text-[11px] font-medium transition-colors" title="Rendered">
        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 5h18M3 10h18M3 15h12M3 20h8"/></svg>
        Visual
      </button>
      <button type="button" @click="switchToCode()"
              :class="mode === 'code' ? 'bg-base-300 text-base-950 shadow-sm' : 'text-base-600 hover:text-base-900'"
              class="flex items-center gap-1 h-6 px-2 rounded text-[11px] font-medium transition-colors" title="Markdown source">
        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m8 7-5 5 5 5M16 7l5 5-5 5"/></svg>
        Code
      </button>
    </div>
  </div>

  <!-- Pane + dropdown wrapper (relative so dropdowns position below active pane) -->
  <div class="relative">

    <!-- Code mode: textarea -->
    <textarea x-show="mode === 'code'"
              x-ref="codearea"
              name="{{.Name}}"
              rows="{{.Rows}}"
              placeholder="{{.Placeholder}}"
              @input="src = $event.target.value; mentionInput($event)"
              @keydown.escape="mentionOpen = false; ticketOpen = false"
              class="w-full bg-base-150 border border-t-0 border-base-300 text-base-900 text-sm rounded-b-lg px-3 py-2 focus:outline-none resize-y font-mono placeholder:text-base-600">{{.Value}}</textarea>

    <!-- Visual mode: contenteditable -->
    <div x-show="mode === 'visual'" x-cloak
         x-ref="visual"
         contenteditable="true"
         @keydown="onVisualKeydown($event)"
         @keydown.escape="mentionOpen = false; ticketOpen = false"
         @input="onVisualInput()"
         class="rich-visual w-full min-h-[9rem] bg-base-150 border border-t-0 border-base-300 text-base-900 text-sm rounded-b-lg px-3 py-2 focus:outline-none overflow-y-auto resize-y prose prose-sm prose-invert max-w-none [&_a]:text-primary-400"></div>

    <!-- @mention dropdown (shared — shown in both Code and Visual modes) -->
    <div x-show="mentionOpen" x-cloak @click.outside="mentionOpen = false"
         class="absolute top-full mt-1 left-0 w-56 bg-base-200 border border-base-300 rounded-lg shadow-pop overflow-hidden z-50">
      <template x-for="u in mentionUsers" :key="u.username">
        <button type="button" @mousedown.prevent @click.stop="mentionPick(u.username)"
                class="w-full flex items-center gap-2 px-3 py-2 hover:bg-base-300 text-left">
          <span class="text-xs font-bold text-primary-400" x-text="'@' + u.username"></span>
          <span class="text-xs text-base-700" x-text="u.name"></span>
        </button>
      </template>
    </div>

    <!-- #ticket dropdown (shared — shown in both Code and Visual modes) -->
    <div x-show="ticketOpen" x-cloak @click.outside="ticketOpen = false"
         class="absolute top-full mt-1 left-0 w-80 bg-base-200 border border-base-300 rounded-lg shadow-pop overflow-hidden z-50">
      <template x-for="t in mentionTickets" :key="t.display_id">
        <button type="button" @mousedown.prevent @click.stop="ticketPick(t.display_id)"
                class="w-full flex items-center gap-2 px-3 py-2 hover:bg-base-300 text-left">
          <span class="text-xs font-bold text-primary-400 font-mono shrink-0" x-text="'#' + t.display_id"></span>
          <span class="text-xs text-base-700 truncate" x-text="t.title"></span>
        </button>
      </template>
    </div>

  </div>
</div>
{{end}}
