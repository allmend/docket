    <button type="button" @mousedown.prevent @click="insertLink()"
            class="w-7 h-7 flex items-center justify-center rounded text-base-600 hover:text-base-950 hover:bg-base-250 transition-colors" title="Link">
      <svg class="w-4 h-4" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M8.91421 6.02513C9.2071 5.73223 9.68197 5.73223 9.97487 6.02513C11.3417 7.39196 11.3417 9.60804 9.97487 10.9749L7.97487 12.9749C6.60803 14.3417 4.39195 14.3417 3.02512 12.9749C1.82824 11.778 1.67995 9.93153 2.57781 8.57265C2.80615 8.22706 3.27142 8.13202 3.61701 8.36036C3.9626 8.5887 4.05765 9.05397 3.8293 9.39956C3.31651 10.1757 3.40282 11.2313 4.08578 11.9142C4.86683 12.6953 6.13316 12.6953 6.91421 11.9142L8.91421 9.91421C9.69525 9.13316 9.69525 7.86683 8.91421 7.08579C8.62131 6.79289 8.62131 6.31802 8.91421 6.02513Z"/><path fill-rule="evenodd" clip-rule="evenodd" d="M7.08578 9.97487C6.79289 10.2678 6.31801 10.2678 6.02512 9.97487C4.65828 8.60804 4.65829 6.39196 6.02512 5.02513L8.02512 3.02513C9.39195 1.65829 11.608 1.65829 12.9749 3.02513C14.1717 4.22201 14.32 6.06847 13.4222 7.42735C13.1938 7.77294 12.7286 7.86798 12.383 7.63964C12.0374 7.4113 11.9423 6.94603 12.1707 6.60044C12.6835 5.82435 12.5972 4.76874 11.9142 4.08579C11.1332 3.30474 9.86683 3.30474 9.08578 4.08579L7.08578 6.08579C6.30473 6.86683 6.30473 8.13316 7.08578 8.91421C7.37867 9.20711 7.37867 9.68198 7.08578 9.97487Z"/></svg>
    </button>

    <div class="flex-1"></div>

    <!-- Segmented Visual / Code view toggle -->
    <div class="flex items-center gap-0.5 p-0.5 bg-base-150 border border-base-300 rounded-lg" role="group" aria-label="Display format">
      <button type="button" @click="switchToVisual()"
              :class="mode === 'visual' ? 'bg-base-300 text-base-950 shadow-sm' : 'text-base-600 hover:text-base-900'"
              class="flex items-center gap-1 h-6 px-2 rounded text-[11px] font-medium transition-colors" title="Rendered">
        <svg class="w-3 h-3" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 9.5C8.82843 9.5 9.5 8.82843 9.5 8C9.5 7.17157 8.82843 6.5 8 6.5C7.17157 6.5 6.5 7.17157 6.5 8C6.5 8.82843 7.17157 9.5 8 9.5Z"/><path fill-rule="evenodd" clip-rule="evenodd" d="M1.3794 8.28049C1.31616 8.09687 1.31625 7.89727 1.37965 7.71371C2.32719 4.97038 4.93238 3 7.99777 3C11.0653 3 13.672 4.97316 14.6179 7.71951C14.6811 7.90313 14.681 8.10274 14.6176 8.2863C13.6701 11.0296 11.0649 13 7.99952 13C4.93197 13 2.32527 11.0268 1.3794 8.28049ZM11 8C11 9.65685 9.65685 11 8 11C6.34315 11 5 9.65685 5 8C5 6.34315 6.34315 5 8 5C9.65685 5 11 6.34315 11 8Z"/></svg>
        Visual
      </button>
      <button type="button" @click="switchToCode()"
              :class="mode === 'code' ? 'bg-base-300 text-base-950 shadow-sm' : 'text-base-600 hover:text-base-900'"
              class="flex items-center gap-1 h-6 px-2 rounded text-[11px] font-medium transition-colors" title="Markdown source">
        <svg class="w-3 h-3" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M4.78033 4.96977C5.07322 5.26266 5.07322 5.73753 4.78033 6.03043L2.81066 8.0001L4.78033 9.96977C5.07322 10.2627 5.07322 10.7375 4.78033 11.0304C4.48744 11.3233 4.01256 11.3233 3.71967 11.0304L1.21967 8.53043C0.926777 8.23753 0.926777 7.76266 1.21967 7.46977L3.71967 4.96977C4.01256 4.67687 4.48744 4.67687 4.78033 4.96977Z"/><path fill-rule="evenodd" clip-rule="evenodd" d="M11.2197 4.96977C10.9268 5.26266 10.9268 5.73753 11.2197 6.03043L13.1893 8.0001L11.2197 9.96977C10.9268 10.2627 10.9268 10.7375 11.2197 11.0304C11.5126 11.3233 11.9874 11.3233 12.2803 11.0304L14.7803 8.53043C15.0732 8.23753 15.0732 7.76266 14.7803 7.46977L12.2803 4.96977C11.9874 4.67687 11.5126 4.67687 11.2197 4.96977Z"/></svg>
        Code
      </button>
    </div>
  </div>

  <!-- Pane + dropdown wrapper (relative so dropdowns position below active pane) -->
  <div class="relative">

    <!-- Code mode: textarea -->
    <textarea x-show="mode === 'code'"
              x-ref="codearea"
              name="{{.Name}}"
              rows="{{.Rows}}"
              placeholder="{{.Placeholder}}"
              @input="src = $event.target.value; mentionInput($event)"
              @keydown.escape="if (mentionOpen || ticketOpen) { $event.stopPropagation(); mentionOpen = false; ticketOpen = false }"
              class="w-full bg-base-150 border border-t-0 border-base-300 text-base-900 text-sm rounded-b-lg px-3 py-2 focus:outline-none resize-y font-mono placeholder:text-base-600">{{.Value}}</textarea>

    <!-- Visual mode: contenteditable -->
    <div x-show="mode === 'visual'" x-cloak
         x-ref="visual"
         contenteditable="true"
         @keydown="onVisualKeydown($event)"
         @keydown.escape="if (mentionOpen || ticketOpen) { $event.stopPropagation(); mentionOpen = false; ticketOpen = false }"
         @input="onVisualInput()"
         class="rich-visual w-full min-h-[9rem] bg-base-150 border border-t-0 border-base-300 text-base-900 text-sm rounded-b-lg px-3 py-2 focus:outline-none overflow-y-auto resize-y prose prose-sm prose-invert max-w-none [&_a]:text-primary-400"></div>

    <!-- @mention dropdown (shared — shown in both Code and Visual modes, anchored at the caret) -->
    {{/* Object-form :style — Alpine's string form would wipe x-show's display:none. */}}
    <div x-show="mentionOpen" x-cloak @click.outside="mentionOpen = false"
         :style="{top: mentionPos.top+'px', left: Math.max(0, Math.min(mentionPos.left, $el.parentElement.clientWidth-224))+'px'}"
         class="absolute w-56 bg-base-200 border border-base-300 rounded-lg shadow-pop overflow-hidden z-50">
      <template x-for="u in mentionUsers" :key="u.username">
        <button type="button" @mousedown.prevent @click.stop="mentionPick(u.username)"
                class="w-full flex items-center gap-2 px-3 py-2 hover:bg-base-300 text-left">
          <span class="text-xs font-bold text-primary-400" x-text="'@' + u.username"></span>
          <span class="text-xs text-base-700" x-text="u.name"></span>
        </button>
      </template>
    </div>

    <!-- #ticket dropdown (shared — shown in both Code and Visual modes, anchored at the caret) -->
    <div x-show="ticketOpen" x-cloak @click.outside="ticketOpen = false"
         :style="{top: mentionPos.top+'px', left: Math.max(0, Math.min(mentionPos.left, $el.parentElement.clientWidth-320))+'px'}"
         class="absolute w-80 bg-base-200 border border-base-300 rounded-lg shadow-pop overflow-hidden z-50">
      <template x-for="t in mentionTickets" :key="t.display_id">
        <button type="button" @mousedown.prevent @click.stop="ticketPick(t.display_id)"
                class="w-full flex items-center gap-2 px-3 py-2 hover:bg-base-300 text-left">
          <span class="text-xs font-bold text-primary-400 font-mono shrink-0" x-text="'#' + t.display_id"></span>
          <span class="text-xs text-base-700 truncate" x-text="t.title"></span>
        </button>
      </template>
    </div>

  </div>
</div>
{{end}}
