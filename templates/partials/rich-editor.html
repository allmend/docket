{{define "rich-editor"}}
{{/* Parameters (via dict): .Name .Value .Placeholder .Rows */}}
<div x-data="richEditor('{{.Name}}')" class="flex flex-col">

  <!-- Toolbar -->
  <div class="flex items-center border border-base-300 rounded-t-lg bg-base-200 px-2 py-1 min-h-[2.25rem] gap-0.5">

    <!-- Visual mode: block type selector (far left) + inline formatting buttons -->
    <div x-show="mode === 'visual'" class="flex items-center gap-0.5">
      <select @mousedown.stop @change="setBlock($event.target.value)" :value="blockType"
              class="h-7 bg-transparent text-xs text-base-content/50 border border-base-300 rounded px-1.5 mr-1 focus:outline-none focus:border-primary cursor-pointer hover:bg-base-300 transition-colors">
        <option value="p">Normal</option>
        <option value="h1">H1</option>
        <option value="h2">H2</option>
        <option value="h3">H3</option>
      </select>

      <div class="w-px h-4 bg-base-300 mx-1 shrink-0"></div>

      <button type="button" @mousedown.prevent @click="toggleInline('strong')"
              :class="isBold ? 'bg-base-300 text-primary' : 'text-base-content/50 hover:text-base-content hover:bg-base-300'"
              class="w-7 h-7 flex items-center justify-center rounded text-sm font-bold transition-colors" title="Bold">B</button>
      <button type="button" @mousedown.prevent @click="toggleInline('em')"
              :class="isItalic ? 'bg-base-300 text-primary' : 'text-base-content/50 hover:text-base-content hover:bg-base-300'"
              class="w-7 h-7 flex items-center justify-center rounded text-sm italic transition-colors" title="Italic">I</button>
      <button type="button" @mousedown.prevent @click="toggleInline('s')"
              :class="isStrike ? 'bg-base-300 text-primary' : 'text-base-content/50 hover:text-base-content hover:bg-base-300'"
              class="w-7 h-7 flex items-center justify-center rounded text-sm transition-colors" title="Strikethrough">
        <span class="line-through">S</span>
      </button>
      <button type="button" @mousedown.prevent @click="toggleInline('code')"
              :class="isCode ? 'bg-base-300 text-primary' : 'text-base-content/50 hover:text-base-content hover:bg-base-300'"
              class="w-7 h-7 flex items-center justify-center rounded text-xs font-mono transition-colors" title="Inline code">`</button>

      <div class="w-px h-4 bg-base-300 mx-1 shrink-0"></div>

      <!-- Bullet list -->
      <button type="button" @mousedown.prevent @click="toggleList('ul')"
              class="w-7 h-7 flex items-center justify-center rounded text-base-content/50 hover:text-base-content hover:bg-base-300 transition-colors" title="Bullet list">
        <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <circle cx="3" cy="5" r="1.5"/>
          <rect x="7" y="4" width="11" height="2" rx="1"/>
          <circle cx="3" cy="10" r="1.5"/>
          <rect x="7" y="9" width="11" height="2" rx="1"/>
          <circle cx="3" cy="15" r="1.5"/>
          <rect x="7" y="14" width="11" height="2" rx="1"/>
        </svg>
      </button>

      <!-- Numbered list -->
      <button type="button" @mousedown.prevent @click="toggleList('ol')"
              class="w-7 h-7 flex items-center justify-center rounded text-base-content/50 hover:text-base-content hover:bg-base-300 transition-colors" title="Numbered list">
        <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <text x="1" y="7" font-size="7" font-family="monospace" fill="currentColor">1.</text>
          <rect x="7" y="4" width="11" height="2" rx="1"/>
          <text x="1" y="12" font-size="7" font-family="monospace" fill="currentColor">2.</text>
          <rect x="7" y="9" width="11" height="2" rx="1"/>
          <text x="1" y="17" font-size="7" font-family="monospace" fill="currentColor">3.</text>
          <rect x="7" y="14" width="11" height="2" rx="1"/>
        </svg>
      </button>

      <div class="w-px h-4 bg-base-300 mx-1 shrink-0"></div>

      <!-- Code block -->
      <button type="button" @mousedown.prevent @click="setCodeBlock()"
              class="w-7 h-7 flex items-center justify-center rounded text-base-content/50 hover:text-base-content hover:bg-base-300 transition-colors font-mono text-xs" title="Code block">
        &lt;/&gt;
      </button>
    </div>

    <!-- Code mode: label -->
    <span x-show="mode === 'code'" class="text-xs text-base-content/30 px-1 select-none">Markdown</span>

    <div class="flex-1"></div>

    <!-- Mode toggle — styled as a button -->
    <button type="button"
            @click="mode === 'code' ? switchToVisual() : switchToCode()"
            class="px-2.5 py-1 text-xs font-medium rounded border transition-colors text-base-content/60 bg-base-100 border-base-300 hover:text-base-content hover:border-base-content/30"
            x-text="mode === 'code' ? 'Visual' : 'Code'"></button>
  </div>

  <!-- Pane + dropdown wrapper (relative so dropdowns position below active pane) -->
  <div class="relative">

    <!-- Code mode: textarea -->
    <textarea x-show="mode === 'code'"
              x-ref="codearea"
              name="{{.Name}}"
              rows="{{.Rows}}"
              placeholder="{{.Placeholder}}"
              @input="src = $event.target.value; mentionInput($event)"
              @keydown.escape="mentionOpen = false; ticketOpen = false"
              class="w-full bg-base-100 border border-t-0 border-base-300 text-base-content text-sm rounded-b-lg px-3 py-2 focus:outline-none resize-y font-mono">{{.Value}}</textarea>

    <!-- Visual mode: contenteditable -->
    <div x-show="mode === 'visual'" x-cloak
         x-ref="visual"
         contenteditable="true"
         @keydown="onVisualKeydown($event)"
         @input="onVisualInput()"
         class="rich-visual w-full min-h-[9rem] bg-base-100 border border-t-0 border-base-300 text-base-content text-sm rounded-b-lg px-3 py-2 focus:outline-none overflow-y-auto resize-y prose prose-sm prose-invert max-w-none [&_a]:text-primary [&_pre]:overflow-x-auto"></div>

    <!-- @mention dropdown (shared — shown in both Code and Visual modes) -->
    <div x-show="mentionOpen" x-cloak @click.outside="mentionOpen = false"
         class="absolute top-full mt-1 left-0 w-56 bg-base-200 border border-base-300 rounded-lg shadow-popup overflow-hidden z-50">
      <template x-for="u in mentionUsers" :key="u.username">
        <button type="button" @mousedown.prevent @click.stop="mentionPick(u.username)"
                class="w-full flex items-center gap-2 px-3 py-2 hover:bg-base-300 text-left">
          <span class="text-xs font-bold text-primary" x-text="'@' + u.username"></span>
          <span class="text-xs text-base-content/60" x-text="u.name"></span>
        </button>
      </template>
    </div>

    <!-- #ticket dropdown (shared — shown in both Code and Visual modes) -->
    <div x-show="ticketOpen" x-cloak @click.outside="ticketOpen = false"
         class="absolute top-full mt-1 left-0 w-80 bg-base-200 border border-base-300 rounded-lg shadow-popup overflow-hidden z-50">
      <template x-for="t in mentionTickets" :key="t.display_id">
        <button type="button" @mousedown.prevent @click.stop="ticketPick(t.display_id)"
                class="w-full flex items-center gap-2 px-3 py-2 hover:bg-base-300 text-left">
          <span class="text-xs font-bold text-primary font-mono shrink-0" x-text="'#' + t.display_id"></span>
          <span class="text-xs text-base-content/60 truncate" x-text="t.title"></span>
        </button>
      </template>
    </div>

  </div>
</div>
{{end}}
