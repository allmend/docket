{{define "board-dod-panel"}}
<div id="board-dod-panel" class="w-72 bg-base-200 border border-base-300 rounded-md shadow-pop p-4 space-y-3">
  <div class="mono text-[13px] uppercase tracking-[0.18em] text-base-600">Definition of Done</div>

  {{if .Items}}
  <ul class="space-y-1.5">
    {{range .Items}}
    <li class="flex items-center gap-2 group">
      <span class="w-3 h-3 rounded-sm border border-base-500 shrink-0"></span>
      <span class="text-[14px] text-base-900 flex-1">{{.Text}}</span>
      <button hx-delete="/boards/{{$.BoardID}}/dod/{{.ID}}"
              hx-target="#board-dod-panel" hx-swap="outerHTML"
              hx-confirm="Remove this DoD item?"
              class="opacity-0 group-hover:opacity-100 w-5 h-5 inline-flex items-center justify-center rounded text-base-600 hover:text-danger">
        <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m3 3 10 10M13 3 3 13"/></svg>
      </button>
    </li>
    {{end}}
  </ul>
  {{end}}

  <!-- Add form -->
  <form hx-post="/boards/{{.BoardID}}/dod"
        hx-target="#board-dod-panel" hx-swap="outerHTML"
        class="flex items-center gap-2 pt-2 border-t border-base-300">
    <input type="text" name="text" placeholder="Add criterion…" required
           class="flex-1 bg-base-150 border border-base-300 rounded px-2 h-7 text-[13px] text-base-900 placeholder:text-base-600 focus:outline-none focus:border-primary-500 shadow-sunk"/>
    <button type="submit"
            class="h-7 px-2.5 bg-primary-500 hover:bg-primary-400 text-[#062b1d] font-medium text-[13px] rounded shadow-lift shrink-0">Add</button>
  </form>
</div>
{{end}}
