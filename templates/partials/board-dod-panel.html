{{define "board-dod-panel"}}
<div id="board-dod-panel" class="flex flex-col gap-3 p-4 w-80 bg-base-200 border border-base-300 rounded-lg shadow-xl">
  <div class="flex items-center justify-between">
    <span class="text-sm font-medium">Definition of Done</span>
  </div>

  {{if .Items}}
  <ul class="flex flex-col gap-1.5">
    {{range .Items}}
    <li class="flex items-center justify-between group">
      <div class="flex items-start gap-2">
        <svg class="h-4 w-4 text-primary/60 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="text-sm text-base-content/80">{{.Text}}</span>
      </div>
      <button class="opacity-0 group-hover:opacity-100 transition-opacity p-0.5 text-base-content/30 hover:text-red-400 shrink-0 ml-2"
              hx-delete="/boards/{{$.BoardID}}/dod/{{.ID}}"
              hx-target="#board-dod-panel"
              hx-swap="outerHTML"
              hx-confirm="Remove '{{.Text}}' from the Definition of Done?"
              title="Remove">
        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      </button>
    </li>
    {{end}}
  </ul>
  {{else}}
  <p class="text-xs text-base-content/30">No checklist items yet. Add one below.</p>
  {{end}}

  <form hx-post="/boards/{{.BoardID}}/dod"
        hx-target="#board-dod-panel"
        hx-swap="outerHTML"
        hx-on::after-request="if(event.detail.successful) this.reset()"
        class="flex gap-2 border-t border-base-300 pt-3 mt-1">
    <input type="text" name="text" required placeholder="e.g. Code reviewed"
           class="flex-1 bg-base-100 border border-base-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-primary" />
    <button type="submit"
            class="px-3 py-1.5 bg-primary text-base-100 text-sm font-medium rounded hover:opacity-90 shrink-0">
      Add
    </button>
  </form>
</div>
{{end}}
