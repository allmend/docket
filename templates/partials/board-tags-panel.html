{{define "board-tags-panel"}}
<div id="board-tags-panel" class="flex flex-col gap-3 p-4 w-72 bg-base-200 border border-base-300 rounded-lg shadow-xl">
  <div class="flex items-center justify-between">
    <span class="text-sm font-medium">Labels</span>
  </div>

  {{range .Tags}}
  <div class="flex items-center justify-between group">
    <span class="flex items-center gap-2">
      <span class="w-3 h-3 rounded-full shrink-0" style="background-color: {{.Color}}"></span>
      <span class="text-sm">{{.Name}}</span>
    </span>
    <button class="opacity-0 group-hover:opacity-100 transition-opacity p-0.5 text-base-content/30 hover:text-red-400"
            hx-delete="/boards/{{$.BoardID}}/tags/{{.ID}}"
            hx-target="#board-tags-panel"
            hx-swap="outerHTML"
            hx-confirm="Delete label {{.Name}}?"
            title="Delete">
      <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
    </button>
  </div>
  {{end}}

  <form hx-post="/boards/{{.BoardID}}/tags"
        hx-target="#board-tags-panel"
        hx-swap="outerHTML"
        x-data="{
          labelColors: ['#8B5CF6','#3B82F6','#F59E0B','#EF4444','#EC4899','#F97316','#06B6D4','#6366F1','#F43F5E','#84CC16','#A855F7','#0EA5E9'],
          color: '',
          init() { this.color = this.labelColors[Math.floor(Math.random() * this.labelColors.length)] },
          nextColor() { this.color = this.labelColors[Math.floor(Math.random() * this.labelColors.length)] }
        }"
        @htmx:after-request="nextColor(); $el.reset()"
        class="flex flex-col gap-2 border-t border-base-300 pt-3 mt-1">
    <input type="text" name="name" required placeholder="Label name"
           class="bg-base-100 border border-base-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-primary w-full" />
    <div class="flex items-center gap-2">
      <input type="color" name="color" :value="color" x-model="color"
             class="w-8 h-8 rounded cursor-pointer bg-transparent border-0 p-0" />
      <button type="submit"
              class="flex-1 px-3 py-1.5 bg-primary text-base-100 text-sm font-medium rounded hover:opacity-90">
        Create label
      </button>
    </div>
  </form>
</div>
{{end}}
