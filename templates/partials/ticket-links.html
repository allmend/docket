{{define "ticket-links"}}
<div id="ticket-links">
  {{if .Links}}
  <div class="bg-base-150 border border-base-300 rounded shadow-sunk divide-y divide-base-300">
    {{range .Links}}
    <div class="flex items-center gap-3 px-3 py-2 group">
      <span class="mono text-[13px] text-base-600 w-16 shrink-0">{{.Relation.Label}}</span>
      <span class="mono text-[13px] text-primary-400">{{.ToDisplayID}}</span>
      <span class="text-[14px] text-base-700 flex-1 truncate">{{.ToTitle}}</span>
      <button hx-delete="/tickets/{{$.TicketID}}/links/{{.ID}}"
              hx-target="#ticket-links"
              hx-swap="outerHTML"
              class="opacity-0 group-hover:opacity-100 w-5 h-5 inline-flex items-center justify-center rounded text-base-600 hover:text-danger hover:bg-danger/10">
        <svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m3 3 10 10M13 3 3 13"/></svg>
      </button>
    </div>
    {{end}}
  </div>
  {{else}}
  <div class="mono text-[13px] text-base-600 italic">No linked tickets.</div>
  {{end}}
</div>
{{end}}
