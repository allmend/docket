{{define "comment"}}
<div class="relative" id="comment-{{.ID}}">
  <span class="absolute -left-[18px] top-1 w-3 h-3 rounded-full bg-track-teal ring-2 ring-base-100"></span>
  <div class="text-[13px] text-base-700 mb-1 flex items-center gap-2">
    <span class="text-base-900 font-medium">{{.AuthorName}}</span>
    <span>commented</span>
    <span>·</span>
    <span>{{timeAgo .CreatedAt}}</span>
    {{if .Edited}}<span class="text-base-600">(edited)</span>{{end}}
    {{if .Editable}}
    <button hx-get="/comments/{{.ID}}/edit"
            hx-target="#comment-{{.ID}}"
            hx-swap="outerHTML"
            class="ml-auto text-base-600 hover:text-base-900 mono text-[12px] opacity-0 group-hover:opacity-100">edit</button>
    <button hx-delete="/comments/{{.ID}}"
            hx-confirm="Delete this comment?"
            hx-target="#comment-{{.ID}}"
            hx-swap="outerHTML"
            class="text-base-600 hover:text-danger mono text-[12px] opacity-0 group-hover:opacity-100">delete</button>
    {{end}}
  </div>
  <div class="prose prose-sm prose-invert max-w-none bg-base-150 border border-base-300 rounded p-3 text-[14px] text-base-800 leading-relaxed [&_a]:text-primary-400 [&_a]:hover:underline shadow-sunk group">
    {{.BodyHTML}}
  </div>
</div>
{{end}}
