{{define "comment-edit-form"}}
<div id="comment-{{.ID}}">
  <form hx-put="/comments/{{.ID}}"
        hx-target="#comment-{{.ID}}"
        hx-swap="outerHTML"
        class="space-y-2">
    <textarea name="body" rows="3" autofocus
              class="block w-full bg-base-150 border border-base-300 rounded px-3 py-2 text-[14px] text-base-800 leading-relaxed focus:outline-none focus:border-primary-500 shadow-sunk resize-y">{{.Body}}</textarea>
    <div class="flex items-center gap-2 justify-end">
      <button type="button"
              hx-get="/comments/{{.ID}}/view"
              hx-target="#comment-{{.ID}}"
              hx-swap="outerHTML"
              class="px-3 py-1 text-[13px] text-base-800 hover:text-base-950 hover:bg-base-250 rounded">Cancel</button>
      <button type="submit"
              class="bg-primary-500 hover:bg-primary-400 text-[#062b1d] font-medium text-[13px] px-2.5 py-1 rounded">Save</button>
    </div>
  </form>
</div>
{{end}}
