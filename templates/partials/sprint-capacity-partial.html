{{define "sprint-capacity-partial"}}
{{$sp := .Sprint}}
<div id="sprint-capacity-partial" class="space-y-3">
  <div class="flex items-center justify-between">
    <span class="mono text-[13px] uppercase tracking-[0.18em] text-base-600">Team capacity</span>
    <span class="mono text-[13px] text-base-700">{{printf "%.0f" .Capacity.CommittedPoints}} pt committed</span>
  </div>

  {{if .Capacity.Members}}
  <div class="space-y-2">
    {{range .Capacity.Members}}
    <div class="flex items-center gap-3">
      <span class="w-5 h-5 rounded-sm text-[#0d1117] inline-flex items-center justify-center mono text-[10px] font-semibold shrink-0" style="background-color:{{avatarColor .Name}}">{{initials .Name}}</span>
      <span class="text-[13px] text-base-900 flex-1 truncate">{{.Name}}</span>
      <input type="number" min="0" max="100" value="{{.FocusPct}}"
             hx-put="/boards/{{$.BoardID}}/sprints/{{$sp.ID}}/capacity/{{.UserID}}"
             hx-vals='{"focus_pct":"{{.FocusPct}}"}'
             hx-trigger="change"
             hx-target="#sprint-capacity-partial" hx-swap="outerHTML"
             class="w-14 bg-base-150 border border-base-300 rounded px-2 h-6 mono text-[13px] text-base-900 text-right focus:outline-none focus:border-primary-500 shadow-sunk [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none"/>
      <span class="mono text-[12px] text-base-600 w-4 shrink-0">%</span>
    </div>
    {{end}}
  </div>
  {{else}}
  <div class="mono text-[13px] text-base-600">No team members configured</div>
  {{end}}
</div>
{{end}}
