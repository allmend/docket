{{define "ticket-tags"}}
{{$t := .Ticket}}
{{$closed := false}}{{if $t}}{{if $t.ClosedAt}}{{$closed = true}}{{end}}{{end}}
<div id="ticket-tags">
  <div class="mono text-[13px] uppercase tracking-[0.18em] text-base-600 mb-1.5">Tracks</div>
  <div class="flex flex-wrap gap-1.5">
    {{range .Tags}}
    <span class="inline-flex items-center gap-1.5 h-5 px-1.5 rounded-sm bg-base-250 border border-base-350 text-[13px] text-base-800 group">
      <span class="w-2 h-2 rounded-sm shrink-0" style="background-color:{{.Color}}"></span>
      {{.Name}}
      {{if not $closed}}
      <button hx-delete="/tickets/{{$t.ID}}/tags/{{.ID}}"
              hx-target="#ticket-tags" hx-swap="outerHTML"
              hx-on::after-request="if(event.detail.successful) document.body.dispatchEvent(new CustomEvent('boardUpdated'))"
              class="opacity-0 group-hover:opacity-100 w-3 h-3 inline-flex items-center justify-center text-base-600 hover:text-danger">×</button>
      {{end}}
    </span>
    {{end}}
    {{if and (not $closed) .BoardTags}}
    <div x-data="{open:false}" class="relative">
      <button @click="open=!open"
              class="inline-flex items-center gap-1 h-5 px-1.5 rounded-sm border border-dashed border-base-500 mono text-[13px] text-base-600 hover:text-base-900 hover:border-base-400">
        <svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 3v10M3 8h10" stroke-linecap="round"/></svg>
        Add
      </button>
      <div x-show="open" @click.outside="open=false"
           class="absolute top-full mt-1 left-0 min-w-[140px] bg-base-250 border border-base-350 rounded shadow-pop z-10 py-1">
        {{range .BoardTags}}
        <button type="button"
                hx-post="/tickets/{{$t.ID}}/tags"
                hx-vals='{"tag_id":"{{.ID}}"}'
                hx-target="#ticket-tags" hx-swap="outerHTML"
                hx-on::after-request="if(event.detail.successful) document.body.dispatchEvent(new CustomEvent('boardUpdated'))"
                @click="open=false"
                class="w-full flex items-center gap-2 px-2.5 py-1.5 text-[13px] text-base-900 hover:bg-base-300">
          <span class="w-2 h-2 rounded-sm shrink-0" style="background-color:{{.Color}}"></span>
          {{.Name}}
        </button>
        {{end}}
      </div>
    </div>
    {{end}}
  </div>
</div>
{{end}}
