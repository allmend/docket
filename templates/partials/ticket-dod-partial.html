{{define "ticket-dod-partial"}}
{{$closed := .IsClosed}}
<div id="ticket-dod-partial">
  {{if .Items}}
  <section class="space-y-2">
    <div class="mono text-[13px] uppercase tracking-[0.18em] text-base-600">Definition of Done</div>
    <ul class="space-y-1.5">
      {{range .Items}}
      <li class="flex items-center gap-2.5">
        {{if not $closed}}
        <button type="button"
                hx-post="/tickets/{{$.TicketID}}/dod/{{.ID}}/toggle"
                hx-vals='{"checked":"{{if .Checked}}false{{else}}true{{end}}"}'
                hx-target="#ticket-dod-partial" hx-swap="outerHTML"
                class="mt-0.5 shrink-0 w-3.5 h-3.5 rounded-sm inline-flex items-center justify-center
                  {{if .Checked}}bg-primary-500{{else}}bg-base-150 border border-base-400{{end}}">
          {{if .Checked}}<svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="#062b1d" stroke-width="2"><path d="m3 6 2 2 4-5"/></svg>{{end}}
        </button>
        {{else}}
        <span class="mt-0.5 shrink-0 w-3.5 h-3.5 rounded-sm inline-flex items-center justify-center
          {{if .Checked}}bg-primary-500{{else}}bg-base-150 border border-base-400{{end}}">
          {{if .Checked}}<svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="#062b1d" stroke-width="2"><path d="m3 6 2 2 4-5"/></svg>{{end}}
        </span>
        {{end}}
        <span class="text-[14px] {{if .Checked}}text-base-600 line-through decoration-base-500{{else}}text-base-900{{end}}">{{.Text}}</span>
      </li>
      {{end}}
    </ul>
  </section>
  {{end}}
</div>
{{end}}
