{{define "team-members"}}
{{$team := .Team}}
<div id="team-members" class="bg-base-200 border border-base-300 rounded-md overflow-hidden">
  {{if .Members}}
  <div class="grid grid-cols-[1fr_80px] gap-3 px-4 h-9 items-center bg-base-250/40 border-b border-base-300">
    <span class="mono text-[13px] uppercase tracking-[0.16em] text-base-600">member</span>
    <span></span>
  </div>
  {{range .Members}}
  <div class="grid grid-cols-[1fr_80px] items-center gap-3 px-4 h-12 border-b border-base-300 hover:bg-base-250/30">
    <div class="flex items-center gap-3 min-w-0">
      <span class="w-7 h-7 rounded-sm bg-track-violet text-[#0d1117] inline-flex items-center justify-center mono text-[12px] font-semibold shrink-0">{{initials .Name}}</span>
      <div class="min-w-0">
        <div class="text-[14px] text-base-950 truncate">{{.Name}}</div>
        <div class="mono text-[12px] text-base-600 truncate">{{.Username}}</div>
      </div>
    </div>
    <div class="text-right">
      <button hx-delete="/workspaces/{{$team.Slug}}/members/{{.ID}}"
              hx-target="#team-members" hx-swap="outerHTML"
              hx-confirm="Remove {{.Name}} from this workspace?"
              class="mono text-[12px] text-base-600 hover:text-danger">remove</button>
    </div>
  </div>
  {{end}}
  {{else}}
  <div class="px-4 py-6 text-center mono text-[13px] text-base-600">No members yet</div>
  {{end}}
</div>
{{end}}
