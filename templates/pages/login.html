{{template "base" .}}

{{define "title"}}Sign in — Docket{{end}}

{{define "content"}}
<div class="w-full max-w-sm px-4">
  <div class="bg-base-200 border border-base-300 rounded-lg p-8 flex flex-col gap-6 shadow-xl">

    <!-- Logo -->
    <div class="flex items-center gap-2">
      <svg class="w-7 h-7 text-primary" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2"  y="2"  width="7" height="7" rx="1"/>
        <rect x="11" y="2"  width="7" height="7" rx="1"/>
        <rect x="2"  y="11" width="7" height="7" rx="1"/>
        <rect x="11" y="11" width="7" height="7" rx="1"/>
      </svg>
      <h1 class="text-xl font-semibold">Docket</h1>
    </div>

    {{if .Error}}
    <div class="flex items-center gap-2 bg-red-900/20 border border-red-800 text-red-400 rounded-lg px-3 py-2.5 text-sm">
      <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
      <span>{{.Error}}</span>
    </div>
    {{end}}

    <form method="POST" action="/login" class="flex flex-col gap-4">

      <div class="flex flex-col gap-1">
        <label class="text-xs uppercase tracking-wide text-base-content/60">Organisation</label>
        <input type="text" name="org" required placeholder="your-org-slug" autocomplete="organization"
               class="w-full bg-base-100 border border-base-300 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:border-primary" />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs uppercase tracking-wide text-base-content/60">Username</label>
        <input type="text" name="username" required placeholder="username" autocomplete="username"
               class="w-full bg-base-100 border border-base-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary" />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs uppercase tracking-wide text-base-content/60">Password</label>
        <input type="password" name="password" required autocomplete="current-password"
               class="w-full bg-base-100 border border-base-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary" />
      </div>

      <button type="submit"
              class="w-full mt-2 px-4 py-2 bg-primary text-base-100 text-sm font-medium rounded-lg hover:opacity-90 transition-opacity">
        Sign in
      </button>

    </form>
  </div>
</div>
{{end}}
